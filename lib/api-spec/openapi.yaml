components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        error:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        nik:
          type: string
        password:
          type: string
      required:
        - nik
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        nik:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, supervisor, employee]
        departmentId:
          type: integer
        departmentName:
          type: string
        isHead:
          type: boolean
        groupIds:
          type: array
          items:
            type: integer
        createdAt:
          type: string
      required:
        - id
        - nik
        - name
        - email
        - role
        - isHead
        - groupIds
        - createdAt

    CreateUserRequest:
      type: object
      properties:
        nik:
          type: string
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, supervisor, employee]
        departmentId:
          type: integer
        isHead:
          type: boolean
        groupIds:
          type: array
          items:
            type: integer
      required:
        - nik
        - name
        - email
        - password
        - role

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, supervisor, employee]
        departmentId:
          type: integer
        isHead:
          type: boolean
        groupIds:
          type: array
          items:
            type: integer

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high]
        picGroupId:
          type: integer
        picGroupName:
          type: string
        color:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - riskLevel
        - createdAt

    CreateCategoryRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high]
        picGroupId:
          type: integer
        color:
          type: string
      required:
        - name
        - riskLevel

    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"
        createdAt:
          type: string
      required:
        - id
        - name
        - members
        - createdAt

    GroupMember:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        nik:
          type: string
      required:
        - userId
        - name
        - email
        - nik

    CreateGroupRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        memberIds:
          type: array
          items:
            type: integer
      required:
        - name

    Plant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        description:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - code
        - createdAt

    CreatePlantRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
      required:
        - name
        - code

    Action:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - createdAt

    CreateActionRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
