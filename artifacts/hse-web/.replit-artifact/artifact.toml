kind = "web"
  previewPath = "/"
  title = "HSE Web Dashboard"
  version = "1.0.0"
  id = "artifacts/hse-web"

[[services]]
localPort = 5174
name = "HSE Web"
paths = ["/"]

[services.env]
PORT = "5174"
BASE_PATH = "/"

[services.development]
run = "pnpm --filter @workspace/hse-web run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/hse-web", "run", "build"]
run = ["pnpm", "--filter", "@workspace/hse-web", "run", "serve"]
